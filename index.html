<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDoList by Artemgus | General</title>
    <style>
        /* Анимация плавного исчезновения */
        @keyframes exit {
            0% {
                opacity: 1;
                transform: scale(1);
            }
            100% {
                opacity: 0;
                transform: scale(0.9);
            }
        }

        /* Класс, который запускает анимацию */
        .hider {
            animation: exit 0.4s ease forwards;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center; 
            align-items: center;     
            background-color: #f5f5f5; 
            font-family: sans-serif;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .mainform {
            border: 1px solid black;
            box-shadow: 0px 0px 10px black;
            width: max-content;
            min-width: 300px; 
            padding: 20px;    
            background-color: white;
            border-radius: 8px; 
            
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 10px; 
        }

        #todoList {
            width: 100%;
            margin-top: 10px;
        }

        li {
            padding: 8px;
            border-radius: 4px;
            transition: background-color 0.2s ease;
        }

        li:hover {
            background-color: rgba(78, 220, 255, 0.659);
        }

        label {
            display: flex;
            align-items: center;
            gap: 8px; 
            cursor: pointer;
        }
    </style>
</head>
<body>
    
    <div class="mainform">
        <input type="text" id="form-text" placeholder="Task">
        <input type="button" value="Add"id='adr'>
        <ul id="todoList">
            <li><label><input type="checkbox" class="tcheck">Задача 1</label></li>
            <li><label><input type="checkbox" class="tcheck">Задача 2</label></li>
            <li><label><input type="checkbox" class="tcheck">Задача 3</label></li>
        </ul>
    </div>

    <script>
const list = document.getElementById('todoList');
const form = document.getElementById('form-text');
const btn = document.getElementById('adr');

// Нажатие на кнопку Add
btn.addEventListener('click', () => {
    const content = form.value.trim(); // .trim() убирает случайные пробелы
    if (content === '') return;       // Не добавляет пустые задачи

    const newLi = document.createElement('li');
    // Обязательно добавляем class="tcheck", чтобы работало удаление!
    newLi.innerHTML = `<label><input type="checkbox" class="tcheck">${content}</label>`;
    list.appendChild(newLi);

    form.value = ''; // ОЧИЩАЕМ ПОЛЕ, чтобы можно было вводить следующую задачу
});

// Ваша функция удаления (осталась без изменений)
list.addEventListener('change', (event) => {
    if (event.target.type === 'checkbox' && event.target.checked) {
        const listItem = event.target.closest('li');
        listItem.classList.add('hider');
        setTimeout(() => {
            listItem.remove();
        }, 400);
    }
});

    </script>
</body>
</html>
