<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Блок поверх остальных элементов</title>
  
  <style>
    /* Базовые стили для демонстрации заднего плана */
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background-color: #f0f0f0;
    }
    
    /* Основная кнопка на странице */
    #showBtn {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    /* ФОНОВЫЙ СЛОЙ (затемнение всего экрана) */
    #overlayDiv {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6); /* Полупрозрачный черный цвет */
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999; /* Выводит блок на самый передний план поверх всего */
    }

    /* КЛАСС ДЛЯ СКРЫТИЯ (когда его нет — блок виден) */
    #overlayDiv.hidden {
      display: none;
    }

    /* ОКНО ПОВЕРХ ОСТАЛЬНЫХ (контентная часть) */
    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      text-align: center;
      min-width: 300px;
    }

    /* Кнопка закрытия внутри окна */
    #closeBtn {
      margin-top: 15px;
      padding: 8px 16px;
      background-color: #ff4d4d;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    #closeBtn:hover {
      background-color: #e60000;
    }
  </style>
</head>
<body>

  <h1>Пример создания слоя поверх остальных</h1>
  <p>Этот текст находится на заднем плане и будет перекрыт при нажатии кнопки.</p>
  
  <!-- Кнопка вызова -->
  <button id="showBtn">Открыть окно</button>

  <!-- Перекрывающий блок (изначально скрыт за счет класса hidden) -->
  <div id="overlayDiv" class="hidden">
    <div class="modal-content">
      <h2>Всплывающее окно</h2>
      <p>Этот блок перекрывает всё содержимое страницы благодаря свойствам position: fixed и z-index.</p>
      <button id="closeBtn">Закрыть</button>
    </div>
  </div>

  <script>
    // Находим нужные элементы в DOM-дереве
    const showBtn = document.getElementById('showBtn');
    const overlayDiv = document.getElementById('overlayDiv');
    const closeBtn = document.getElementById('closeBtn');

    // Показываем блок: удаляем класс скрытия при клике на главную кнопку
    showBtn.addEventListener('click', () => {
      overlayDiv.classList.remove('hidden');
    });

    // Скрываем блок: возвращаем класс скрытия при клике на кнопку «Закрыть»
    closeBtn.addEventListener('click', () => {
      overlayDiv.classList.add('hidden');
    });

    // Дополнительное удобство: закрываем блок при клике на темную область вокруг окна
    overlayDiv.addEventListener('click', (event) => {
      if (event.target === overlayDiv) {
        overlayDiv.classList.add('hidden');
      }
    });
  </script>

</body>
</html>
